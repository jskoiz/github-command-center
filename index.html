<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="A focused local GitHub dashboard for repositories, PRs, issues, CI, and Actions billing." />
    <title>GitHub Command Center</title>
    <meta name="theme-color" content="#fcfcfd" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#1c1c1c" media="(prefers-color-scheme: dark)" />
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("github-command-center:theme")
          var dark = stored === "dark" || (stored !== "light" && matchMedia("(prefers-color-scheme: dark)").matches)
          if (dark) document.documentElement.classList.add("dark")
        } catch (e) { /* theme falls back to light */ }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
