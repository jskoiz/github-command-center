<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="A better GitHub homepage: PRs, issues, commits, CI, and Actions billing across all your repos." />
    <title>okgithub</title>
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="okgithub" />
    <meta property="og:title" content="A better GitHub homepage." />
    <meta property="og:description" content="PRs, issues, commits, CI, and Actions billing across all your repos." />
    <meta property="og:image" content="https://okgithub.com/social/og-image-light.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="okgithub preview showing a better GitHub homepage dashboard." />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="A better GitHub homepage." />
    <meta name="twitter:description" content="PRs, issues, commits, CI, and Actions billing across all your repos." />
    <meta name="twitter:image" content="https://okgithub.com/social/og-image-light.png" />
    <meta name="theme-color" content="#fcfcfd" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#1c1c1c" media="(prefers-color-scheme: dark)" />
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("github-command-center:theme")
          var dark = stored === "dark" || (stored !== "light" && matchMedia("(prefers-color-scheme: dark)").matches)
          if (dark) document.documentElement.classList.add("dark")
        } catch (e) { /* theme falls back to light */ }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
